services:
  app:
    build:
      context: .
    image: ai-grain-grade:local
    env_file:
      - .env
    environment:
      QWEN_VL_PROVIDER: ${QWEN_VL_PROVIDER:-dashscope}
    ports:
      - "8501:8501"
    volumes:
      - feedback_data:/app/data/feedback/feedback_data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  feedback_data:
